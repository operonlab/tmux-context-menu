name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint (zero warnings)
        run: |
          shellcheck -S warning \
            context-menu.tmux \
            scripts/build-menu.sh \
            scripts/show-menu.sh \
            scripts/teardown.sh \
            scripts/helpers.sh \
            tests/menu-test.sh

  smoke:
    name: tmux smoke (isolated socket)
    runs-on: ubuntu-latest
    # tmux ships in Ubuntu's repos; the menu-binding + teardown behaviour this
    # job checks is portable. The optional copy module's *system-clipboard*
    # piping (pbcopy on macOS / xclip on Linux) is environment-specific and is
    # NOT exercised here — it needs a real clipboard, so it stays a documented,
    # manually-verified feature rather than a fake CI assertion.
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: tmux version
        run: tmux -V
      - name: Menu builder + bindings (isolated socket)
        # Drives the real menu-building code on a private tmux -L socket: the
        # version gate, the live-state conditional items, the entry-point
        # bindings and teardown. See tests/menu-test.sh for the assertions.
        run: tests/menu-test.sh
