name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint (zero warnings)
        run: |
          shellcheck -S warning \
            context-menu.tmux \
            scripts/build-menu.sh \
            scripts/teardown.sh \
            scripts/helpers.sh

  smoke:
    name: tmux smoke (isolated socket)
    runs-on: ubuntu-latest
    # tmux ships in Ubuntu's repos; the menu-binding + teardown behaviour this
    # job checks is portable. The optional copy module's *system-clipboard*
    # piping (pbcopy on macOS / xclip on Linux) is environment-specific and is
    # NOT exercised here — it needs a real clipboard, so it stays a documented,
    # manually-verified feature rather than a fake CI assertion.
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: tmux version
        run: tmux -V
      - name: Load plugin on an isolated socket and assert bindings
        run: |
          set -u
          SOCK="ctxmenu-ci-$$"
          cleanup() { tmux -L "$SOCK" kill-server 2>/dev/null || true; }
          trap cleanup EXIT
          REPO="$PWD"

          tmux -L "$SOCK" -f /dev/null new-session -d -x 200 -y 50
          tmux -L "$SOCK" set -g @context-menu-mouse on
          tmux -L "$SOCK" set -g @context-menu-key M-q
          tmux -L "$SOCK" set -g @context-menu-mouse-copy on
          tmux -L "$SOCK" run-shell "$REPO/context-menu.tmux"
          sleep 0.3

          fail=0
          check() {  # <description> <grep-args...>
            desc="$1"; shift
            if tmux -L "$SOCK" list-keys -T root | grep -Eq "$@"; then
              echo "ok: $desc"
            else
              echo "FAIL: $desc"; fail=1
            fi
          }

          check "mouse right-click menu bound" "MouseDown3Pane[[:space:]]+display-menu"
          check "copy module root double-click bound" "DoubleClick1Pane[[:space:]]+select-pane -t ="
          if tmux -L "$SOCK" list-keys | grep -Eq "M-q[[:space:]]+display-menu"; then
            echo "ok: keyboard entry (M-q) bound"
          else
            echo "FAIL: keyboard entry (M-q) bound"; fail=1
          fi

          # Extra item injection must rebuild and source without error.
          tmux -L "$SOCK" set -g @context-menu-extra "Reload|Q|source-file ~/.tmux.conf"
          if tmux -L "$SOCK" run-shell "$REPO/context-menu.tmux"; then
            echo "ok: rebuild after @context-menu-extra injection"
          else
            echo "FAIL: rebuild after @context-menu-extra injection"; fail=1
          fi
          if tmux -L "$SOCK" list-keys -T root | grep -q "Reload"; then
            echo "ok: extra item present in menu"
          else
            echo "FAIL: extra item present in menu"; fail=1
          fi

          # Teardown must remove our entry points.
          tmux -L "$SOCK" run-shell "$REPO/scripts/teardown.sh"
          sleep 0.2
          if tmux -L "$SOCK" list-keys -T root | grep -Eq "^bind-key +-T root +MouseDown3Pane "; then
            echo "FAIL: MouseDown3Pane still bound after teardown"; fail=1
          else
            echo "ok: MouseDown3Pane removed after teardown"
          fi

          exit "$fail"
